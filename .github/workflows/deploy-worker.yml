name: Deploy Worker

on:
  push:
    branches:
      - main
    paths:
      - "workers/weather/**"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/weather
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: workers/weather/package-lock.json
      - run: npm ci
      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
